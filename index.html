<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Task Scheduler - Free Email Notifications</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 24px;
        }

        .app-container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .auth-panel {
            background: white;
            border-radius: 2rem;
            padding: 2rem;
            text-align: center;
            max-width: 460px;
            margin: 2rem auto;
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.1);
        }

        .auth-panel h2 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .input-group label {
            font-weight: 600;
            color: #333;
            display: block;
            margin-bottom: 0.5rem;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 1rem;
            font-size: 1rem;
            transition: 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            width: 100%;
            padding: 12px;
            font-weight: 600;
            font-size: 1rem;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
        }

        .main-app {
            display: none;
            padding: 2rem;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #e0e0e0;
        }

        .welcome-text {
            font-size: 1.5rem;
            font-weight: 700;
            color: #333;
        }

        .btn-logout {
            background: #ff4757;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
            font-weight: 500;
        }

        .task-form-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 1rem;
            align-items: end;
        }

        .form-field label {
            font-weight: 600;
            color: #333;
            display: block;
            margin-bottom: 0.3rem;
            font-size: 0.9rem;
        }

        .form-field input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 0.8rem;
            font-size: 1rem;
        }

        .btn-add {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            height: 42px;
        }

        .btn-add:hover {
            background: #219a52;
        }

        .cancel-btn {
            background: #95a5a6;
        }

        .task-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1rem;
        }

        .task-card {
            background: white;
            border-radius: 1rem;
            padding: 1.2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-left: 4px solid #667eea;
            transition: transform 0.2s;
        }

        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        .task-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 0.5rem;
        }

        .task-time {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            margin: 0.5rem 0;
        }

        .next-run {
            font-size: 0.8rem;
            color: #666;
            margin: 0.5rem 0;
        }

        .task-status {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 0.5rem;
            background: #d4edda;
            color: #155724;
        }

        .task-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            justify-content: flex-end;
        }

        .edit-btn, .delete-btn, .run-now-btn {
            padding: 0.4rem 1rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .edit-btn {
            background: #3498db;
            color: white;
        }

        .delete-btn {
            background: #e74c3c;
            color: white;
        }

        .run-now-btn {
            background: #f39c12;
            color: white;
        }

        .empty-msg {
            text-align: center;
            padding: 3rem;
            color: #999;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #667eea;
        }

        .free-badge {
            background: #27ae60;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-left: 10px;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .main-app {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div id="loginPanel" class="auth-panel">
        <h2><i class="fas fa-clock"></i> Daily Task Scheduler <span class="free-badge">FREE</span></h2>
        <p>Schedule tasks with real email notifications - 100% Free!</p>
        <div class="input-group">
            <label><i class="fas fa-user"></i> Username</label>
            <input type="text" id="loginUsername" placeholder="Enter your username">
        </div>
        <button id="loginBtn" class="btn-primary">Login / Signup</button>
        <div style="margin-top: 1rem; font-size: 0.8rem; color: #666;">
            <i class="fas fa-envelope"></i> Free email notifications using EmailJS
        </div>
    </div>

    <div id="mainApp" class="main-app">
        <div class="app-header">
            <div class="welcome-text" id="welcomeUser"></div>
            <button id="logoutBtn" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>

        <div class="task-form-card">
            <h3 style="margin-bottom: 1rem;" id="formTitle">Add New Daily Task</h3>
            <div class="form-row">
                <div class="form-field">
                    <label>Task Name *</label>
                    <input type="text" id="taskName" placeholder="e.g., Morning Exercise">
                </div>
                <div class="form-field">
                    <label>Daily Time (24hr)</label>
                    <input type="time" id="taskTime" value="09:00">
                </div>
                <div>
                    <button id="addTaskBtn" class="btn-add"><i class="fas fa-plus"></i> Add Task</button>
                    <button id="cancelEditBtn" class="btn-add cancel-btn" style="display:none;"><i class="fas fa-times"></i> Cancel</button>
                </div>
            </div>
            <input type="hidden" id="editTaskId">
        </div>

        <div class="tasks-section">
            <h3><i class="fas fa-tasks"></i> Your Daily Tasks <span id="taskCount"></span></h3>
            <div id="tasksContainer" class="task-grid">
                <div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading tasks...</div>
            </div>
        </div>
    </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- EmailJS - Free Email Service -->
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyDpsV1bhJU1yPvSdCM8cOrhd9CQwLqq2x0",
        authDomain: "routine-6c88f.firebaseapp.com",
        projectId: "routine-6c88f",
        messagingSenderId: "143702093059",
        appId: "1:143702093059:web:dd383a289b6e99cfc24d36"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // FREE EmailJS Configuration (No credit card required)
    // Sign up at https://www.emailjs.com/ (free - 200 emails/day)
    // Then replace these with your keys:
    const EMAILJS_PUBLIC_KEY = "YOUR_PUBLIC_KEY";  // Get from EmailJS
    const EMAILJS_SERVICE_ID = "YOUR_SERVICE_ID";  // Get from EmailJS
    const EMAILJS_TEMPLATE_ID = "YOUR_TEMPLATE_ID"; // Get from EmailJS

    // For demo purposes, we'll use a simulation until you sign up for EmailJS
    let useRealEmail = false; // Set to true after getting EmailJS keys

    // Initialize EmailJS if keys are provided
    if (EMAILJS_PUBLIC_KEY !== "YOUR_PUBLIC_KEY") {
        emailjs.init(EMAILJS_PUBLIC_KEY);
        useRealEmail = true;
        console.log("EmailJS initialized for real emails!");
    }

    // Global Variables
    let currentUser = null;
    let userEmail = null;
    let tasksUnsubscribe = null;
    let checkInterval = null;
    let editingTaskId = null;

    // DOM Elements
    const loginPanel = document.getElementById('loginPanel');
    const mainApp = document.getElementById('mainApp');
    const loginUsername = document.getElementById('loginUsername');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const welcomeUser = document.getElementById('welcomeUser');
    const taskName = document.getElementById('taskName');
    const taskTime = document.getElementById('taskTime');
    const addTaskBtn = document.getElementById('addTaskBtn');
    const cancelEditBtn = document.getElementById('cancelEditBtn');
    const editTaskId = document.getElementById('editTaskId');
    const tasksContainer = document.getElementById('tasksContainer');
    const taskCount = document.getElementById('taskCount');
    const formTitle = document.getElementById('formTitle');

    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${message}`;
        toast.style.background = isError ? '#e74c3c' : '#27ae60';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // Send email using EmailJS (FREE)
    async function sendEmail(taskName, username, userEmail) {
        if (useRealEmail) {
            try {
                const templateParams = {
                    to_email: userEmail,
                    user_name: username,
                    task_name: taskName,
                    execution_time: new Date().toLocaleString(),
                    message: `Your daily task "${taskName}" has been executed successfully!`
                };
                
                await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams);
                console.log(`✅ Real email sent to ${userEmail}`);
                return true;
            } catch (error) {
                console.error('EmailJS error:', error);
                showToast('Email service error. Using simulation.', true);
                return false;
            }
        } else {
            // Simulation mode (no account needed)
            console.log(`📧 SIMULATION: Email would be sent to ${userEmail}`);
            console.log(`   Subject: Task Executed: ${taskName}`);
            console.log(`   Body: Your task "${taskName}" was executed at ${new Date().toLocaleString()}`);
            return true;
        }
    }

    function calculateNextRunTime(timeString) {
        if (!timeString) return new Date();
        const now = new Date();
        const [hours, minutes] = timeString.split(':');
        const scheduledTime = new Date();
        scheduledTime.setHours(parseInt(hours), parseInt(minutes), 0, 0);
        
        if (scheduledTime <= now) {
            scheduledTime.setDate(scheduledTime.getDate() + 1);
        }
        return scheduledTime;
    }

    async function executeTask(taskId, taskName, taskTimeStr) {
        try {
            // Send email notification
            await sendEmail(taskName, currentUser, userEmail);
            
            // Show notification
            showToast(`✅ Task "${taskName}" executed! Email sent to ${userEmail}`);
            
            // Log to Firestore (optional)
            await db.collection('task_executions').add({
                taskId: taskId,
                taskName: taskName,
                executedAt: firebase.firestore.FieldValue.serverTimestamp(),
                username: currentUser,
                userEmail: userEmail
            });
            
            return true;
        } catch (error) {
            console.error('Error executing task:', error);
            showToast(`Task "${taskName}" executed but email failed`, true);
            return false;
        }
    }

    async function checkAndExecuteTasks(tasks) {
        if (!tasks || tasks.length === 0) return;
        
        const now = new Date();
        const currentTimeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        
        for (const task of tasks) {
            if (task.time === currentTimeStr) {
                await executeTask(task.id, task.name, task.time);
            }
        }
    }

    function startScheduler(tasks) {
        if (checkInterval) clearInterval(checkInterval);
        
        checkInterval = setInterval(() => {
            if (currentUser && tasks) {
                checkAndExecuteTasks(tasks);
            }
        }, 60000);
        
        checkAndExecuteTasks(tasks);
    }

    function renderTasks(tasksSnapshot) {
        const tasks = [];
        tasksSnapshot.forEach(doc => {
            tasks.push({ id: doc.id, ...doc.data() });
        });
        
        tasks.sort((a, b) => (a.time || '').localeCompare(b.time || ''));
        
        if (tasks.length === 0) {
            tasksContainer.innerHTML = '<div class="empty-msg"><i class="far fa-smile"></i> No daily tasks yet. Create one above!</div>';
            taskCount.textContent = '(0)';
            return;
        }
        
        taskCount.textContent = `(${tasks.length})`;
        
        tasksContainer.innerHTML = tasks.map(task => {
            const nextRun = calculateNextRunTime(task.time);
            const timeUntil = Math.round((nextRun - new Date()) / 60000);
            const timeUntilText = timeUntil <= 0 ? 'Running soon...' : 
                                 timeUntil < 60 ? `in ${timeUntil} minutes` :
                                 `in ${Math.floor(timeUntil / 60)}h ${timeUntil % 60}m`;
            
            return `
                <div class="task-card">
                    <div class="task-name">
                        ${escapeHtml(task.name)}
                        <span class="task-status">Daily</span>
                    </div>
                    <div class="task-time">
                        <i class="fas fa-clock"></i> ${task.time}
                    </div>
                    <div class="next-run">
                        <i class="fas fa-hourglass-half"></i> Next: ${nextRun.toLocaleTimeString()}<br>
                        <small>(${timeUntilText})</small>
                    </div>
                    <div class="task-actions">
                        <button class="run-now-btn" onclick="manualRun('${task.id}', '${escapeHtml(task.name)}', '${task.time}')">
                            <i class="fas fa-play"></i> Run Now
                        </button>
                        <button class="edit-btn" onclick="editTask('${task.id}', '${escapeHtml(task.name)}', '${task.time}')">
                            <i class="fas fa-edit"></i> Edit
                        </button>
                        <button class="delete-btn" onclick="deleteTask('${task.id}')">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </div>
                </div>
            `;
        }).join('');
        
        startScheduler(tasks);
    }

    window.manualRun = async function(taskId, taskName, taskTime) {
        await executeTask(taskId, taskName, taskTime);
    };
    
    window.editTask = function(id, name, time) {
        taskName.value = name;
        taskTime.value = time;
        editingTaskId = id;
        editTaskId.value = id;
        addTaskBtn.textContent = 'Update Task';
        cancelEditBtn.style.display = 'inline-block';
        formTitle.textContent = 'Edit Daily Task';
    };
    
    window.deleteTask = async function(id) {
        if (confirm('Delete this daily task?')) {
            await db.collection('tasks').doc(id).delete();
            showToast('Task deleted');
        }
    };

    function subscribeToTasks() {
        if (tasksUnsubscribe) tasksUnsubscribe();
        if (!currentUser) return;
        
        tasksContainer.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading...</div>';
        
        const q = db.collection('tasks').where('username', '==', currentUser);
        tasksUnsubscribe = q.onSnapshot(snapshot => {
            renderTasks(snapshot);
        }, error => {
            console.error(error);
            tasksContainer.innerHTML = '<div class="empty-msg">Error loading tasks. Check security rules.</div>';
        });
    }

    async function saveTask() {
        const name = taskName.value.trim();
        const time = taskTime.value;
        
        if (!name || !time) {
            showToast('Please fill all fields', true);
            return;
        }
        
        const taskData = {
            username: currentUser,
            name: name,
            time: time,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        };
        
        try {
            if (editingTaskId) {
                await db.collection('tasks').doc(editingTaskId).update(taskData);
                showToast('Task updated');
                resetForm();
            } else {
                await db.collection('tasks').add(taskData);
                showToast('Task added! You will receive emails when it runs.');
                resetForm();
            }
        } catch (error) {
            showToast('Error saving task', true);
        }
    }

    function resetForm() {
        taskName.value = '';
        taskTime.value = '09:00';
        editingTaskId = null;
        editTaskId.value = '';
        addTaskBtn.textContent = 'Add Task';
        cancelEditBtn.style.display = 'none';
        formTitle.textContent = 'Add New Daily Task';
    }

    async function login(username) {
        if (!username || username.trim() === '') {
            showToast('Please enter username', true);
            return;
        }
        
        const email = prompt('📧 Enter your email for notifications:', `${username}@example.com`);
        if (!email) {
            showToast('Email required for notifications', true);
            return;
        }
        
        currentUser = username.trim();
        userEmail = email.trim();
        
        sessionStorage.setItem('dailyTaskUser', currentUser);
        sessionStorage.setItem('userEmail', userEmail);
        
        // Save email to Firestore
        await db.collection('users').doc(currentUser).set({ email: userEmail });
        
        loginPanel.style.display = 'none';
        mainApp.style.display = 'block';
        welcomeUser.innerHTML = `<i class="fas fa-calendar-day"></i> Welcome, ${escapeHtml(currentUser)}!`;
        
        resetForm();
        subscribeToTasks();
        
        const emailStatus = useRealEmail ? 'real emails' : 'simulated emails';
        showToast(`✅ Logged in! You'll receive ${emailStatus} at ${userEmail}`);
    }

    function logout() {
        if (tasksUnsubscribe) tasksUnsubscribe();
        if (checkInterval) clearInterval(checkInterval);
        currentUser = null;
        sessionStorage.removeItem('dailyTaskUser');
        sessionStorage.removeItem('userEmail');
        loginPanel.style.display = 'block';
        mainApp.style.display = 'none';
        showToast('Logged out');
    }

    // Event Listeners
    loginBtn.addEventListener('click', () => login(loginUsername.value));
    logoutBtn.addEventListener('click', logout);
    addTaskBtn.addEventListener('click', saveTask);
    cancelEditBtn.addEventListener('click', resetForm);
    
    loginUsername.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') login(loginUsername.value);
    });

    // Restore session
    const savedUser = sessionStorage.getItem('dailyTaskUser');
    const savedEmail = sessionStorage.getItem('userEmail');
    if (savedUser && savedEmail) {
        currentUser = savedUser;
        userEmail = savedEmail;
        login(savedUser);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Show free mode info
    console.log('Running in FREE mode! No credit card required.');
</script>
</body>
</html>
