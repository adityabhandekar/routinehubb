<!DOCTYPE html>
<html>
<head>
  <title>Routine App</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Firebase CDN -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>
</head>

<body class="container mt-5">

  <div id="loginDiv">
    <h3>Login</h3>
    <input id="username" class="form-control" placeholder="Enter name">
    <button onclick="login()" class="btn btn-primary mt-2">Login</button>
  </div>

  <div id="appDiv" style="display:none;">
    <h3 id="welcome"></h3>

    <input id="taskTitle" class="form-control" placeholder="Task">
    <input id="taskTime" type="time" class="form-control mt-2">

    <button onclick="addTask()" class="btn btn-success mt-2">Add Task</button>

    <ul id="taskList" class="list-group mt-3"></ul>
  </div>

  <script src="firebase.js"></script>
  <script src="app.js"></script>

</body>
</html>
